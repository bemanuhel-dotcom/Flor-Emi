<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Emi, con todo mi amor</title>
    <style>
        /* Estilos generales con fondo estilo lienzo texturizado */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Fondo degradado suave en tonos lila y azul pastel, imitando acuarela */
            background: radial-gradient(circle, #e0e4ff 0%, #f3e5f5 60%, #e1f5fe 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow: hidden;
            position: relative;
        }

        /* MARCO DE FLORES Y ENREDADERAS (Estilo de la imagen de referencia) */
        .page-border {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 2px dashed rgba(156, 39, 176, 0.25);
            border-radius: 20px;
            pointer-events: none;
            z-index: 20;
        }

        /* Detalles de flores en las esquinas del marco */
        .page-border::before, .page-border::after {
            content: "🌸 🌿";
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.6;
        }
        .page-border::before { top: -10px; left: -10px; }
        .page-border::after { bottom: -10px; right: -10px; }

        /* CONTENEDOR PRINCIPAL INTERFAZ PROFESIONAL */
        .interface-container {
            text-align: center;
            z-index: 10;
            max-width: 600px;
            width: 90%;
            padding: 20px;
        }

        /* Textos estilizados con sombras suaves */
        h1 {
            color: #4a148c;
            font-size: 2.2rem;
            font-weight: normal;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(74, 20, 140, 0.15);
        }

        .subtitle {
            color: #1a237e;
            font-size: 1.3rem;
            font-style: italic;
            font-weight: 300;
            margin-top: 0;
            margin-bottom: 40px;
            text-shadow: 0 1px 3px rgba(26, 35, 126, 0.1);
        }

        /* --- FLOR INTEGRAL SVG ANIMADA (LILA Y AZUL) --- */
        .flower-wrapper {
            width: 180px;
            height: 180px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 10px 25px rgba(103, 58, 183, 0.25));
            /* Animación constante: late y rota sutilmente */
            animation: majesticBloom 5s infinite ease-in-out;
        }

        @keyframes majesticBloom {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.08) rotate(15deg); filter: drop-shadow(0 15px 35px rgba(33, 150, 243, 0.4)); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* --- BAILARINA INTEGRADA AL FONDO --- */
        .ballerina-silhouette {
            position: absolute;
            font-size: 12rem;
            color: #7b1fa2;
            opacity: 0.08; /* Muy sutil, igual que la silueta difuminada de la imagen */
            pointer-events: none;
            z-index: 1;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Animación fluida de ballet y desvanecimiento continuo */
            animation: etherealDance 8s infinite ease-in-out;
        }

        @keyframes etherealDance {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.06; }
            50% { transform: translate(-45%, -53%) scale(1.15) rotate(5deg); opacity: 0.12; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.06; }
        }

        /* DESTELLOS MÁGICOS DE AMBIENTE */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            animation: floatGlow 6s infinite ease-in-out;
        }

        @keyframes floatGlow {
            0% { transform: translateY(110vh) translateX(0) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) translateX(20px) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="page-border"></div>

    <div class="ballerina-silhouette">💃</div>

    <div class="interface-container">
        <h1>Te amo, Emi</h1>
        <div class="subtitle">Que nunca falten tus flores a distancia ✨</div>
        
        <div class="flower-wrapper">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <circle cx="50" cy="50" r="10" fill="#ffca28" filter="drop-shadow(0 0 4px #ffb300)"/>
                
                <path d="M50,50 C40,20 60,20 50,50" fill="#9c27b0" opacity="0.85"/>
                <path d="M50,50 C75,30 85,50 50,50" fill="#2196f3" opacity="0.85"/>
                <path d="M50,50 C75,70 65,90 50,50" fill="#673ab7" opacity="0.85"/>
                <path d="M50,50 C40,80 20,70 50,50" fill="#ba68c8" opacity="0.85"/>
                <path d="M50,50 C15,60 25,30 50,50" fill="#1565c0" opacity="0.85"/>
                <circle cx="50" cy="50" r="12" fill="none" stroke="#fff" stroke-width="0.5" stroke-dasharray="2"/>
            </svg>
        </div>
    </div>

    <script>
        // Sistema de partículas pastel flotantes (pétalos caídos y destellos)
        const elementos = ['✨', '🌸', '✧', '🔹'];
        function generarParticula() {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.innerText = elementos[Math.floor(Math.random() * elementos.length)];
            
            p.style.left = Math.random() * 100 + "vw";
            p.style.fontSize = (Math.random() * 14 + 10) + "px";
            
            // Colores suaves acordes a la paleta lila/azul
            p.style.color = Math.random() > 0.5 ? '#b39ddb' : '#90caf9';
            
            const duracion = Math.random() * 3 + 5;
            p.style.animationDuration = duration + "s";
            
            document.body.appendChild(p);
            setTimeout(() => { p.remove(); }, duration * 1000);
        }
        // Crear partículas espaciadas para mantener la elegancia limpia
        setInterval(generarParticula, 800);
    </script>

</body>
</html>
